<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Account Recovery</title>
      <link rel="stylesheet" href="{{ url_for('static', filename='css/forgot_password.css') }}">
   </head>
   <body>
      <div class="recovery-container">
         <h2>Account Recovery</h2>
         <p id="desc-text">Enter your registered email to receive a reset link.</p>
         <form id="email-form" method="POST">
            <input type="email" name="email" class="input-box" placeholder="Email Address" required>
            <button type="submit" class="btn">Send Recovery Link</button>
            <a class="toggle-link" style="color:white;" onclick="toggleView()">No access to email? Use Mnemonic</a>
         </form>
         <form id="mnemonic-form" class="hidden" method="POST">
            <input type="text" name="mnemonic" class="input-box" placeholder="Enter your 12-word mnemonic" required>
            <button type="submit" class="btn">Verify & Reset</button>
            <a class="toggle-link" style="color:white;" onclick="toggleView()">Back to Email Recovery</a>
         </form>
      </div>
      <script>
         function toggleView() {
             const emailForm = document.getElementById('email-form');
             const mnemonicForm = document.getElementById('mnemonic-form');
             const desc = document.getElementById('desc-text');
         
             emailForm.classList.toggle('hidden');
             mnemonicForm.classList.toggle('hidden');
         
             desc.innerText = mnemonicForm.classList.contains('hidden') 
                 ? "Enter your registered email to receive a reset link."
                 : "Enter the secret 12-word phrase generated during your registration.";
         }
      </script>
   </body>
</html>
