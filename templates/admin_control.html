<!DOCTYPE html>
<html style="background:#333; color:white; font-family:sans-serif;">
   <body style="display:flex; justify-content:center; padding:20px;">
      <div style="width:100%; max-width:450px; background:#252525; padding:25px; border-radius:20px; ">
         <h2 style="text-align:center; color:#fff;">Admin Panel</h2>
         <a href="/" style="color:#fff; display:block; text-align:center; margin-bottom:20px; text-decoration:none;">← Back to Site</a>
         {% for t in tickets %}
         <div style="background:rgba(0,0,0,0.4); padding:15px; border-radius:15px; margin-bottom:15px; border-left:4px solid #FF69B4;">
            <div style="color:#fff; font-weight:bold; font-size:0.8rem;">@{{ t.username or 'Unknown' }}</div>
            <div style="font-size:1.1rem; font-weight:bold; margin:5px 0;">{{ t.subject }}</div>
            <p style="color:#fff; font-size:0.9rem;">{{ t.message }}</p>
            {% if t.status|lower == 'open' %}
            <a href="/admin/resolve/{{ t.id }}" 
               style="display:block; background:#22c55e; color:white; text-align:center; padding:10px; border-radius:10px; text-decoration:none; font-weight:bold; margin-top:10px;">
            Resolve Now
            </a>
            {% elif t.status|lower == 'resolved' %}
            <div style="text-align:center; color:#22c55e; font-size:0.8rem; margin-top:10px;">✅ Resolved</div>
            {% endif %}
         </div>
         {% else %}
         <p style="text-align:center; color:#64748b;">No tickets found in the database.</p>
         {% endfor %}
      </div>
   </body>
</html>
